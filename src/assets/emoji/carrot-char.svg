<svg viewBox="0 0 220 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cbody" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0" stop-color="#FFB45C"/>
      <stop offset="0.45" stop-color="#FF8A1E"/>
      <stop offset="1" stop-color="#EE7008"/>
    </linearGradient>
    <linearGradient id="cleaf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#63D58D"/>
      <stop offset="1" stop-color="#22A157"/>
    </linearGradient>
    <radialGradient id="cshine" cx="0.35" cy="0.28" r="0.5">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- leaves -->
  <path d="M110 80 C104 44 100 20 110 8 C120 20 116 44 112 80 Z" fill="url(#cleaf)"/>
  <path d="M106 80 C86 54 70 40 62 20 C88 28 102 50 110 76 Z" fill="url(#cleaf)"/>
  <path d="M114 80 C134 54 150 40 158 20 C132 28 118 50 110 76 Z" fill="url(#cleaf)"/>
  <path d="M109 74 C104 50 102 32 108 18 C114 32 113 52 111 74 Z" fill="#7DE0A3" opacity="0.7"/>

  <!-- arms (drawn before body so they sit at the sides) -->
  <rect x="30" y="170" width="42" height="17" rx="8.5" fill="#FF8A1E" transform="rotate(26 51 178)"/>
  <circle cx="33" cy="194" r="11" fill="#FF9A33"/>
  <rect x="150" y="120" width="46" height="17" rx="8.5" fill="#FF8A1E" transform="rotate(-32 173 128)"/>
  <circle cx="192" cy="106" r="12" fill="#FF9A33"/>

  <!-- feet -->
  <ellipse cx="92" cy="270" rx="15" ry="10" fill="#E5731A"/>
  <ellipse cx="128" cy="270" rx="15" ry="10" fill="#E5731A"/>

  <!-- body -->
  <path d="M110 76 C151 76 169 97 169 122 C169 163 139 286 110 290 C81 286 51 163 51 122 C51 97 69 76 110 76 Z" fill="url(#cbody)"/>
  <!-- glossy highlight -->
  <ellipse cx="92" cy="130" rx="34" ry="60" fill="url(#cshine)"/>
  <!-- ridges -->
  <path d="M70 116 C88 108 132 108 150 116" fill="none" stroke="#E5731A" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <path d="M74 168 C90 161 130 161 146 168" fill="none" stroke="#E5731A" stroke-width="4" stroke-linecap="round" opacity="0.45"/>
  <path d="M82 214 C94 209 126 209 138 214" fill="none" stroke="#E5731A" stroke-width="4" stroke-linecap="round" opacity="0.4"/>

  <!-- face -->
  <circle cx="80" cy="148" r="11" fill="#FF5E73" opacity="0.5"/>
  <circle cx="140" cy="148" r="11" fill="#FF5E73" opacity="0.5"/>
  <circle cx="93" cy="130" r="14" fill="#FFFFFF"/>
  <circle cx="127" cy="130" r="14" fill="#FFFFFF"/>
  <circle cx="95" cy="132" r="7.5" fill="#4A3326"/>
  <circle cx="125" cy="132" r="7.5" fill="#4A3326"/>
  <circle cx="98" cy="128" r="2.8" fill="#FFFFFF"/>
  <circle cx="128" cy="128" r="2.8" fill="#FFFFFF"/>
  <path d="M99 148 Q110 160 121 148" fill="none" stroke="#6E370A" stroke-width="3.6" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
